defaults:
  - /defaults.yaml

experiment:
  run_name: ours_afhq
  tags: [baseline, ours, afhq]
  conditional: False

dataset:
  name: afhq
  split: train
  download: true
  batch_size: 256
  subset_size: null  # Set to a smaller value to limit projection cache size
  resolution: 64  # Keep resolution manageable for covariance projections

model:
  name: ours
  params:
    temperature: 1.0
    mask_threshold: 0.040
    chunk_size: 512
    k_min: 1000    # ~ N/15 (N=15000 for AFHQ), lower bound of k_t (Eq. 6)
    k_max: 2000    # ~ N/7.5, upper bound of k_t and lower bound of m_t (Sec. 3.4)
    low_res_dim: 16
    weight_method: ss



metrics:
  baseline_name: baseline_unet
  baseline_unet_path: "services/base_models/baseline_unet/afhq/ckpt_epoch_200.pt"
  baseline_edm_path: "services/base_models/baseline_edm/afhq/edm-afhqv2-64x64-uncond-ve.pkl"

