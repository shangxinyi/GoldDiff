defaults:
  - /defaults.yaml

experiment:
  run_name: ours_cifar10
  tags: [baseline, ours, cifar10]
  conditional: False

dataset:
  name: cifar10
  split: train
  download: true
  batch_size: 256
  subset_size: null  # Set to a smaller value to limit projection cache size
  num_classes: 10
  resolution: 32  # Keep resolution manageable for covariance projections

model:
  name: ours
  params:
    temperature: 1.0
    mask_threshold: 0.030
    chunk_size: 1024
    k_min: 2500    # = N/20 (N=50000 for CIFAR-10), lower bound of k_t (Eq. 6)
    k_max: 5000    # = N/10, upper bound of k_t and lower bound of m_t (Sec. 3.4)
    low_res_dim: 16
    weight_method: ss


metrics:
  baseline_name: baseline_unet
  baseline_unet_path: "services/base_models/baseline_unet/cifar10/ckpt_epoch_200.pt"
  baseline_edm_path: "services/base_models/baseline_edm/cifar10/edm-cifar10-32x32-uncond-ve.pkl"
  # baseline_edm_path: "services/base_models/baseline_edm/cifar10/edm-cifar10-32x32-cond-ve.pkl"
